name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI runs on ubuntu-latest with cachix/install-nix-action.
# Self-hosted runners use self-hosted-fast.yml instead (USE_SELFHOSTED gate).
# Both workflows trigger on push — they don't overlap.

jobs:
  byte-compile:
    name: Byte Compile
    if: vars.USE_SELFHOSTED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        continue-on-error: true
      - name: Byte-compile all Elisp
        run: nix develop --command just build

  ert-test:
    name: ERT Tests
    if: vars.USE_SELFHOSTED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        continue-on-error: true
      - name: Run ERT test suite
        run: nix develop --command just test

  lint:
    name: Lint Elisp
    if: vars.USE_SELFHOSTED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        continue-on-error: true
      - name: Lint Elisp (strict byte-compile)
        run: nix develop --command just lint-elisp

  nix-build:
    name: Nix Build
    if: vars.USE_SELFHOSTED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        continue-on-error: true
      - name: Check flake evaluates
        run: nix flake check --no-build
      - name: Build devShell
        run: nix build .#devShells.x86_64-linux.default

  changelog-validate:
    name: Changelog Validate
    if: vars.USE_SELFHOSTED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v30
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        continue-on-error: true
      - name: Validate git-cliff config
        run: nix develop --command git-cliff --validate cliff.toml
