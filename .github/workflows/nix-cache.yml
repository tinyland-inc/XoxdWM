name: Nix Build & Cache

on:
  push:
    branches: [main, dev]
    paths:
      - 'compositor/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'compositor/**'
      - 'flake.nix'
      - 'flake.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Nix Build
    runs-on: ${{ vars.USE_SELFHOSTED == 'true' && 'tinyland-nix' || 'ubuntu-latest' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
      - uses: ryanccn/attic-action@v0
        if: env.ATTIC_SERVER != ''
        with:
          endpoint: ${{ env.ATTIC_SERVER }}
          cache: ${{ env.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Check flake
        run: nix flake check --no-build

      - name: Build compositor
        run: nix build .#compositor --out-link result-compositor

      - name: Build headless compositor
        run: nix build .#compositor-headless --out-link result-headless

      - name: Build devShell
        run: nix build .#devShells.x86_64-linux.default --out-link result-devshell

      - name: Push to Attic cache
        if: env.ATTIC_SERVER != '' && github.event_name == 'push'
        run: |
          for link in result result-compositor result-headless result-devshell result-elisp; do
            if [ -L "$link" ]; then
              echo "Pushing $link to Attic..."
              attic push "$ATTIC_CACHE" "$link" || echo "Warning: failed to push $link"
            fi
          done
