# tuned profile: xr-bci
#
# Optimized for BCI (Brain-Computer Interface) workloads on Dell T7810
# with PREEMPT_RT kernel, targeting sub-ms I/O latency for:
#   - 100:100 channel AD/DA electrophysiology
#   - C777 external sample wordclock synchronization
#   - Bigscreen Beyond 2e VR at 90Hz (11.1ms frame budget)
#
# Based on firmware RE analysis of Dell T7810 BIOS A34:
#   - 153 SMM handlers identified, 10 CRITICAL/HIGH SMI sources
#   - ACPI_BASE=0x0400, SMI_EN at port 0x0430
#   - USB Legacy (bits 3,17) = primary SMI storm source
#   - PCH SMI Dispatcher routes via EFI_SMM_SW_DISPATCH2
#
# Install: sudo cp -r xr-bci /etc/tuned/ && sudo tuned-adm profile xr-bci
# Verify:  sudo tuned-adm active && sudo hwlatdetect --duration=60

[main]
summary=XR/BCI low-latency profile for Dell T7810 (C610/Wellsburg PCH)
include=latency-performance

[variables]
# Cores reserved for BCI I/O (adapt to your topology)
# Dell T7810 dual-socket: 0-7 = socket 0, 8-15 = socket 1
isolated_cores=2-7
housekeeping_cores=0-1

[bootloader]
# SMI mitigation boot params (derived from firmware RE)
# tsc=nowatchdog:     prevent clocksource watchdog from marking TSC unstable
# clocksource=tsc:    TSC is ~20ns access vs HPET ~1us
# nosoftlockup:       RT scheduling triggers false soft lockup warnings
# intel_pstate=disable: prevent P-state SMI routing through SMM
# processor.max_cstate=1: prevent C-state transitions (APIC wakeup latency)
# intel_idle.max_cstate=0: disable intel_idle C-state management
# nmi_watchdog=0:     disable NMI perf watchdog (interferes with RT)
# mce=ignore_ce:      ignore corrected machine check (reduces SMI from MCE handler)
# idle=poll:          never enter idle states (maximum responsiveness, costs power)
# nohz_full=${isolated_cores}: tickless on isolated cores
# rcu_nocbs=${isolated_cores}: offload RCU callbacks from isolated cores
# isolcpus=${isolated_cores}: isolate BCI cores from scheduler
# irqaffinity=${housekeeping_cores}: pin IRQs to housekeeping cores
cmdline=tsc=nowatchdog clocksource=tsc nosoftlockup intel_pstate=disable processor.max_cstate=1 intel_idle.max_cstate=0 nmi_watchdog=0 mce=ignore_ce idle=poll skew_tick=1 transparent_hugepage=never nowatchdog rcu_nocb_poll nohz=on nohz_full=${isolated_cores} rcu_nocbs=${isolated_cores} kthread_cpus=${housekeeping_cores} isolcpus=managed_irq,domain,${isolated_cores} irqaffinity=${housekeeping_cores}

[sysctl]
# Reduce kernel noise on isolated cores
kernel.timer_migration=0
kernel.sched_rt_runtime_us=-1
kernel.hung_task_timeout_secs=0
vm.stat_interval=120
kernel.watchdog=0
kernel.nmi_watchdog=0

# Disable NUMA auto-balancing (conflicts with explicit CPU isolation)
kernel.numa_balancing=0

# Memory management for large BCI buffers
vm.swappiness=0
vm.dirty_ratio=3
vm.dirty_background_ratio=1

[scheduler]
# Isolate BCI cores from general scheduling
isolated_cores=${isolated_cores}

[irqbalance]
# Keep IRQs away from BCI cores
banned_cpus=${isolated_cores}

[script]
script=${i:PROFILE_DIR}/script.sh
